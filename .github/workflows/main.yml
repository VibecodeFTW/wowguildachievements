name: WoW Guild Achievement Tracker

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write  # allow committing changes

jobs:
  check-achievements:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run achievement check
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
          GUILD_NAME: ${{ secrets.GUILD_NAME }}
          REALM: ${{ secrets.REALM }}
          REGION: ${{ secrets.REGION }}
        run: node index.js

      - name: Commit updated lastAchievement.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lastAchievement.json
          git commit -m "Update last achievement ID [skip ci]" || echo "No changes to commit"
          git push
